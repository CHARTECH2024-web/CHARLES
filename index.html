<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARTECH Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Écran d'authentification -->
    <div id="authScreen">
        <div class="auth-box">
            <h2>CHARTECH</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showAuthTab('login')">Connexion</button>
                <button class="auth-tab" onclick="showAuthTab('register')">Inscription</button>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Mot de passe" required>
                <button onclick="login()">Se connecter</button>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="registerName" placeholder="Nom d'utilisateur" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="password" id="registerPassword" placeholder="Mot de passe" required>
                <input type="file" id="registerPhoto" accept="image/*">
                <button onclick="register()">S'inscrire</button>
            </div>
        </div>
    </div>

    <!-- Application principale -->
    <div id="mainApp" class="hidden">
        <div class="app-container">
            <!-- Barre latérale -->
            <div class="sidebar">
                <div class="profile">
                    <img id="profilePic" src="default-avatar.png" alt="Profile">
                    <span id="profileName"></span>
                </div>
                <div class="sidebar-tabs">
                    <button class="sidebar-tab active" onclick="showMainTab('chats')">💬 Chats</button>
                    <button class="sidebar-tab" onclick="showMainTab('groups')">👥 Groupes</button>
                    <button class="sidebar-tab" onclick="showMainTab('ai')">🤖 IA</button>
                    <button class="sidebar-tab" onclick="showMainTab('settings')">⚙️ Paramètres</button>
                </div>
                <div class="ad-banner">
                    📢 Publicité - Soutiens CHARTECH !
                </div>
            </div>

            <!-- Contenu principal -->
            <div class="main-content">
                <!-- Section Chats -->
                <div id="chatsSection" class="main-section active">
                    <div class="section-header">
                        <h3>Conversations</h3>
                        <button onclick="showNewChatModal()">➕</button>
                    </div>
                    <div id="chatsList" class="items-list"></div>
                    <div class="chat-area hidden" id="chatArea">
                        <div class="chat-area-header">
                            <span id="currentChatName"></span>
                            <button onclick="closeChat()">✕</button>
                        </div>
                        <div class="messages" id="messages"></div>
                        <div class="message-input">
                            <input type="text" id="messageText" placeholder="Écrire un message...">
                            <button onclick="startVoiceRecording()">🎤</button>
                            <button onclick="sendMessage()">Envoyer</button>
                        </div>
                    </div>
                </div>

                <!-- Section Groupes -->
                <div id="groupsSection" class="main-section">
                    <div class="section-header">
                        <h3>Groupes</h3>
                        <button onclick="showNewGroupModal()">➕</button>
                    </div>
                    <div id="groupsList" class="items-list"></div>
                </div>

                <!-- Section IA -->
                <div id="aiSection" class="main-section">
                    <div class="ai-container">
                        <h3>Assistant IA CHARTECH</h3>
                        <div class="ai-buttons">
                            <button id="deepThinkBtn" onclick="toggleDeepThink()">🧠 Réfléchir profond</button>
                            <button id="webSearchBtn" onclick="toggleWebSearch()">🌐 Recherche en ligne</button>
                        </div>
                        <div id="aiThinking" class="ai-thinking hidden">🤖 réfléchit...</div>
                        <div class="ai-messages" id="aiMessages"></div>
                        <div class="ai-input">
                            <input type="text" id="aiInput" placeholder="Pose ta question...">
                            <button onclick="sendAIMessage()">Envoyer</button>
                        </div>
                        <div class="ai-media-input">
                            <input type="file" id="aiMedia" accept="image/*,video/*,audio/*" multiple>
                        </div>
                    </div>
                </div>

                <!-- Section Paramètres -->
                <div id="settingsSection" class="main-section">
                    <h3>Paramètres</h3>
                    <div class="theme-selector">
                        <label>Thème :</label>
                        <button onclick="setTheme('dark')">Sombre</button>
                        <button onclick="setTheme('light')">Clair</button>
                        <button onclick="setTheme('blue-night')">Bleu nuit</button>
                    </div>
                    <div class="language-selector">
                        <label>Langue :</label>
                        <button onclick="setLanguage('fr')">Français</button>
                        <button onclick="setLanguage('en')">English</button>
                    </div>
                    <button onclick="logout()">Déconnexion</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modales -->
    <div id="newChatModal" class="modal hidden">
        <div class="modal-content">
            <h3>Nouvelle conversation</h3>
            <input type="email" id="newChatEmail" placeholder="Email du destinataire">
            <button onclick="startPrivateChat()">Démarrer</button>
            <button onclick="closeModal()">Annuler</button>
        </div>
    </div>

    <div id="newGroupModal" class="modal hidden">
        <div class="modal-content">
            <h3>Nouveau groupe</h3>
            <input type="text" id="newGroupName" placeholder="Nom du groupe">
            <textarea id="newGroupMembers" placeholder="Emails des membres (séparés par des virgules)"></textarea>
            <button onclick="createGroup()">Créer</button>
            <button onclick="closeModal()">Annuler</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recordrtc/5.6.2/RecordRTC.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
